services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mediamanager
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: secret123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 admin secret123;
        mc mb --ignore-existing local/media;
      "

  api:
    build:
      context: .
      dockerfile: MediaManager.API/Dockerfile
    ports:
      - "5000:8080"
    depends_on: [postgres, minio]
    environment:
      ConnectionStrings__Default: "Host=postgres;Database=mediamanager;Username=postgres;Password=secret"
      Storage__Endpoint: "http://minio:9000"
      Storage__AccessKey: "admin"
      Storage__SecretKey: "secret123"
      Storage__BucketName: "media"

volumes:
  pgdata:
  minio_data:
