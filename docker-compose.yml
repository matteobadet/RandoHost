services:

  # ── Bases de données ───────────────────────────────────────────────────────

  postgres-ged:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mediamanager
    volumes:
      - pgdata_ged:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  postgres-users:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: usermanager
    volumes:
      - pgdata_users:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  # ── Stockage objet ─────────────────────────────────────────────────────────

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"    # Console MinIO
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
        mc mb --ignore-existing local/media;
        mc mb --ignore-existing local/avatars;
      "

  # ── Back — GED ─────────────────────────────────────────────────────────────

  ged-api:
    build:
      context: ./back/GED/MediaManager
      dockerfile: MediaManager.API/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      postgres-ged:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__Default: "Host=postgres-ged;Database=mediamanager;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Storage__Endpoint: "http://minio:9000"
      Storage__PublicEndpoint: "http://localhost:9000"
      Storage__AccessKey: "${MINIO_ACCESS_KEY}"
      Storage__SecretKey: "${MINIO_SECRET_KEY}"
      Storage__BucketName: "media"
      ASPNETCORE_ENVIRONMENT: "Development"

  # ── Back — UserManager ─────────────────────────────────────────────────────

  user-api:
    build:
      context: ./back/UserManager
      dockerfile: UserManager.API/Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      postgres-users:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__Default: "Host=postgres-users;Database=usermanager;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Storage__Endpoint: "http://minio:9000"
      Storage__PublicEndpoint: "http://localhost:9000"
      Storage__AccessKey: "${MINIO_ACCESS_KEY}"
      Storage__SecretKey: "${MINIO_SECRET_KEY}"
      Storage__AvatarBucket: "avatars"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "UserManager"
      Jwt__Audience: "RandoHostApps"
      Jwt__AccessTokenMinutes: "15"
      Jwt__RefreshTokenDays: "7"
      ASPNETCORE_ENVIRONMENT: "Development"

  # ── Front ──────────────────────────────────────────────────────────────────

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - ged-api
      - user-api
    environment:
      VITE_API_USER: "http://localhost/user-api"
      VITE_API_GED: "http://localhost/ged-api"

volumes:
  pgdata_ged:
  pgdata_users:
  minio_data:
