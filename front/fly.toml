# fly.toml app configuration file generated for randohost-front on 2026-06-16T16:03:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'randohost-front'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
